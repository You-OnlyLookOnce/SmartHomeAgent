<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悦悦 - 智能家居助手</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧功能列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">🌤️ 悦悦</h1>
                <p class="app-subtitle">你的智能家居伙伴</p>
            </div>
            
            <div class="chat-management">
                <div class="chat-header">
                    <h3>对话</h3>
                    <button class="new-chat-btn" id="new-chat-btn">+ 新建</button>
                </div>
                <div class="chat-list" id="chat-list">
                    <!-- 对话列表将动态生成 -->
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item" data-section="device">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">设备控制</span>
                    </li>
                    <li class="nav-item" data-section="task">
                        <span class="nav-icon">📋</span>
                        <span class="nav-text">任务管理</span>
                    </li>
                    <li class="nav-item" data-section="memory">
                        <span class="nav-icon">🧠</span>
                        <span class="nav-text">记忆管理</span>
                    </li>
                    <li class="nav-item" data-section="distillation">
                        <span class="nav-icon">🔥</span>
                        <span class="nav-text">记忆蒸馏</span>
                    </li>
                    <li class="nav-item" data-section="status">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">系统状态</span>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="chat-title-section">
                    <h2 class="section-title" id="section-title">聊天</h2>
                    <div class="chat-actions">
                        <button class="action-btn" id="rename-chat-btn">重命名</button>
                        <button class="action-btn" id="delete-chat-btn">删除</button>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 聊天区域 -->
                <section id="chat-section" class="content-section active">
                    <div class="chat-area" id="chat-area">
                        <!-- 初始界面将通过JavaScript动态添加 -->
                    </div>
                    
                    <!-- 新对话初始化界面 -->
                    <div class="chat-initialization" id="chat-initialization" style="display: none;">
                        <div class="initialization-content">
                            <div class="initialization-icon">☀️</div>
                            <div class="initialization-text">我是悦悦☀，你的智能家庭管家</div>
                            <div class="initialization-questions">
                                <div class="question-item" onclick="sendQuestion('今天天气怎么样')">今天天气怎么样</div>
                                <div class="question-item" onclick="sendQuestion('你知道怎么做西红柿炒鸡蛋吗')">你知道怎么做西红柿炒鸡蛋吗</div>
                            </div>
                        </div>
                    </div>
                    

                    
                    <div class="input-area">
                        <input type="text" id="message-input" placeholder="跟悦悦说点什么..." />
                        <button class="send-btn" id="send-btn">发送</button>
                    </div>
                </section>
                
                <!-- 设备控制区域 -->
                <section id="device-section" class="content-section">
                    <div class="device-panel" id="device-panel">
                        <h3>设备控制</h3>
                        <div class="device-list">
                            <div class="device-item">
                                <h4>客厅灯</h4>
                                <div class="device-controls">
                                    <button class="device-btn" data-device="living_room_light" data-action="on">开</button>
                                    <button class="device-btn" data-device="living_room_light" data-action="off">关</button>
                                    <input type="range" min="0" max="100" value="50" class="brightness-slider" data-device="living_room_light">
                                    <span class="brightness-value">50%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- 任务管理区域 -->
                <section id="task-section" class="content-section">
                    <div class="task-panel" id="task-panel">
                        <h3>任务管理</h3>
                        <div class="task-tabs">
                            <button class="tab-btn active" data-tab="regular">普通任务</button>
                            <button class="tab-btn" data-tab="scheduled">定时任务</button>
                        </div>
                        <div class="tab-content">
                            <div id="regular-tab" class="tab-pane active">
                                <div class="task-controls">
                                    <input type="text" id="task-input" placeholder="输入任务内容，如：明天早上8点提醒我开会" />
                                    <button class="task-btn" id="create-task-btn">创建任务</button>
                                </div>
                                <div class="task-list" id="task-list">
                                    <!-- 任务列表将动态生成 -->
                                </div>
                            </div>
                            <div id="scheduled-tab" class="tab-pane">
                                <div class="scheduler-tabs">
                                    <button class="scheduler-tab-btn active" data-scheduler-tab="regular">普通定时任务</button>
                                    <button class="scheduler-tab-btn" data-scheduler-tab="batch_inference">批量推理任务</button>
                                </div>
                                <div class="scheduler-tab-content">
                                    <div id="regular-scheduler-tab" class="scheduler-tab-pane active">
                                        <div class="scheduler-controls">
                                            <input type="text" id="schedule-task-input" placeholder="输入任务内容" />
                                            <input type="datetime-local" id="schedule-time-input" />
                                            <button class="save-btn" id="create-schedule-btn">创建定时任务</button>
                                        </div>
                                    </div>
                                    <div id="batch-inference-scheduler-tab" class="scheduler-tab-pane">
                                        <div class="scheduler-controls">
                                            <input type="text" id="batch-inference-task-input" placeholder="输入任务名称" />
                                            <input type="text" id="batch-inference-cron-input" placeholder="输入CRON表达式，如：0 12 * * 6" />
                                            <input type="text" id="batch-inference-model-input" placeholder="输入模型名称，如：deepseek-v3" />
                                            <input type="text" id="batch-inference-input-url" placeholder="输入输入文件URL" />
                                            <input type="text" id="batch-inference-description-input" placeholder="输入任务描述（可选）" />
                                            <button class="save-btn" id="create-batch-inference-btn">创建批量推理任务</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="schedule-list" id="schedule-list">
                                    <!-- 定时任务列表将动态生成 -->
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- 记忆管理区域 -->
                <section id="memory-section" class="content-section">
                    <div class="memory-panel">
                        <h3>记忆管理</h3>
                        <div class="memory-tabs">
                            <button class="tab-btn active" data-tab="soul">人格文件 (Soul)</button>
                            <button class="tab-btn" data-tab="memory">记忆文件 (Memory)</button>
                        </div>
                        <div class="tab-content">
                            <div id="soul-tab" class="tab-pane active">
                                <textarea id="soul-content" rows="10" placeholder="编辑人格文件内容..."></textarea>
                                <button class="save-btn" id="save-soul-btn">保存</button>
                            </div>
                            <div id="memory-tab" class="tab-pane">
                                <textarea id="memory-content" rows="10" placeholder="编辑记忆文件内容..."></textarea>
                                <button class="save-btn" id="save-memory-btn">保存</button>
                            </div>
                        </div>
                    </div>
                </section>
                

                
                <!-- 记忆蒸馏区域 -->
                <section id="distillation-section" class="content-section">
                    <div class="distillation-panel">
                        <h3>记忆蒸馏</h3>
                        <p>记忆蒸馏可以帮助整理和优化你的记忆，提取重要信息并去除冗余内容。</p>
                        <div class="distillation-tabs">
                            <button class="tab-btn active" data-tab="manual">手动蒸馏</button>
                            <button class="tab-btn" data-tab="scheduled">定时蒸馏</button>
                        </div>
                        <div class="tab-content">
                            <div id="manual-tab" class="tab-pane active">
                                <button class="distill-btn" id="start-distillation-btn">开始蒸馏</button>
                                <div class="distillation-status" id="distillation-status">
                                    <!-- 蒸馏状态将动态更新 -->
                                </div>
                                <div class="distillation-result" id="distillation-result">
                                    <!-- 蒸馏结果将动态更新 -->
                                </div>
                            </div>
                            <div id="scheduled-tab" class="tab-pane">
                                <div class="scheduled-distillation-settings">
                                    <h4>定时蒸馏设置</h4>
                                    <div class="setting-item">
                                        <label for="distill-frequency">蒸馏频率:</label>
                                        <select id="distill-frequency">
                                            <option value="daily">每天</option>
                                            <option value="weekly">每周</option>
                                            <option value="monthly">每月</option>
                                        </select>
                                    </div>
                                    <div class="setting-item">
                                        <label for="distill-time">执行时间:</label>
                                        <input type="time" id="distill-time" value="00:00">
                                    </div>
                                    <div class="setting-item">
                                        <label for="distill-days">处理天数:</label>
                                        <input type="number" id="distill-days" value="7" min="1" max="30">
                                    </div>
                                    <button class="save-btn" id="save-distill-settings-btn">保存设置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- 系统状态区域 -->
                <section id="status-section" class="content-section">
                    <div class="status-panel">
                        <h3>系统状态</h3>
                        <div class="status-list">
                            <div class="status-item">
                                <span class="status-label">服务状态</span>
                                <span class="status-value status-online">在线</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">Agent状态</span>
                                <span class="status-value status-online">正常</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">API响应</span>
                                <span class="status-value status-online">正常</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">数据库</span>
                                <span class="status-value status-online">正常</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    
    <!-- 命名模态窗口 -->
    <div class="modal" id="name-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建新对话</h3>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <label for="chat-name-input">请输入对话名称:</label>
                <input type="text" id="chat-name-input" placeholder="输入对话名称" maxlength="20">
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" id="cancel-create-btn">取消</button>
                <button class="confirm-btn" id="confirm-create-btn">确认</button>
            </div>
        </div>
    </div>
    
    <script src="../static/js/app.js"></script>
</body>
</html>
